<% layout "layouts/layout", page_title: 'Termos' %>

<section class="py-12 container mx-auto relative overflow-hidden">
  <div class="flex flex-col gap-1 pb-12 text-left">
    <h1 class="text-4xl md:text-5xl font-bold text-foreground">
      Termos e Condições
    </h1>
    <p class="text-muted-foreground text-base">
      Leia atentamente nossos termos de serviço para entender como operamos e protegemos você.
    </p>
  </div>

  <div class="mx-auto">
    <div class="bg-background rounded-2xl border border-primary/30 p-8">
      <% if terms %>
        <div class="centralcart-content">
          <%= terms %>
        </div>
      <% else %>
        <div class="text-sm text-muted-foreground">
          Os termos e condições ainda não foram definidos para esta loja.
        </div>
      <% endif %>
    </div>
  </div>
</section>

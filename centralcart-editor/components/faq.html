<section class="py-16 relative overflow-hidden">
  <div class="text-left mb-12">
    <h2 class="text-3xl md:text-4xl font-bold leading-tight mb-1">
      Perguntas frequentes (FAQ)
    </h2>
    <p class="text-muted-foreground text-base">
      Veja as perguntas mais comuns e suas respostas.
    </p>
  </div>

  <div class="space-y-2">
    <% for faq_item in faq %>
      <details
        class="faq-item group rounded-xl bg-muted backdrop-blur-xl border overflow-hidden">
        <summary class="flex items-center justify-between py-3 px-4 cursor-pointer list-none">
          <h3 class="text-lg font-semibold pr-4">
            <%= faq_item.question %>
          </h3>
          <i data-lucide="chevron-down"
            class="size-5 flex-shrink-0 transition-transform duration-150 group-open:rotate-180"></i>
        </summary>
        <div class="faq-content">
          <div class="px-6 pb-6 pt-0">
            <div class="pt-4 border-t">
              <p class="text-muted-foreground leading-relaxed">
                <%= faq_item.answer %>
              </p>
            </div>
          </div>
        </div>
      </details>
    <% endfor %>
  </div>
</section>

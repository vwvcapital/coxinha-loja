<div 
  id="dialog-<%= id %>" 
  class="w-screen h-screen flex items-center justify-center z-50 fixed top-0 left-0 group dialog hidden" 
  data-state="closed"
>
  <div 
    class="max-h-[90vh] overflow-auto custom-scrollbar bg-muted w-full rounded-xl 
    <% if className %><%= className %><% endif %>
    lg:w-[<%= width | default: '500px' %>]"
  >
    <div class="p-5 relative">
      <div class="flex flex-col space-y-1.5 text-center sm:text-left">
        <h2 id="dialog-<%= id %>-title" class="text-lg font-semibold leading-none tracking-tight"><%= title %></h2>
      </div>
      
      <button 
        type="button" 
        aria-label="Fechar" 
        class="absolute right-4 top-1/2 -translate-y-1/2 inline-flex 
        items-center justify-center rounded-full p-1 bg-red-500 hover:bg-red-500/80 text-foreground
        transition-all" 
        onclick="closeDialog('<%= id %>')"
      >
        <i data-lucide="x" class="size-4 text-background"></i>
      </button>
    </div>
    <div class="p-6 bg-background/60">
      <%= content %>
    </div>
  </div>
</div>

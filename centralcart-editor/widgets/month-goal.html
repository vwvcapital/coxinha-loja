<div class="rounded-xl p-4 bg-muted">
  <h1 class="font-semibold text-lg text-white">
    Meta do mês
  </h1>
  <p class="text-muted-foreground text-sm">Ajude-nos a continuar online.</p>
  <div class="goal-bar mt-4" style="--goal_percent: <%= month_goal.percent %>%">
    <span class="text-foreground">
      <%= month_goal.goal_display %>
    </span>
  </div>
  <h3 class="text-sm text-brand mt-1 font-semibold">
    <%= month_goal.percent %>% completo
  </h3>
</div>
